# FORGE CONFIG (DO NOT REMOVE!)
include forge-conf/3264110/before/*;
include forge-conf/3264110/willow.jerome-arfouche.ca/before/*;

server {
    http2 on;
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name willow.jerome-arfouche.ca;
    server_tokens off;
    root /home/forge/willow.jerome-arfouche.ca/current/public;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Block source maps from being served
    location ~* \.map$ {
        return 404;
    }

    # --- Bot / scanner mitigation ---
    # NOTE: To enable rate limiting, add this to the http{} block in /etc/nginx/nginx.conf:
    #   limit_req_zone $binary_remote_addr zone=general:10m rate=20r/m;
    # Then uncomment the line below:
    # limit_req zone=general burst=40 nodelay;

    # Drop connections from known scanner user agents
    if ($http_user_agent ~* "(zgrab|masscan|l9scan|leakix|CVE-|CyberConvoy|RecordedFuture|Go-http-client)") {
        return 444;
    }
    if ($http_user_agent = "") {
        return 444;
    }

    # WordPress / WP REST API probing — this site does not run WordPress
    location ~* ^/(wp-admin|wp-content|wp-includes|wp-json|wp-login\.php|wp-config\.php|xmlrpc\.php|wlwmanifest\.xml) {
        return 444;
    }

    # Joomla probing
    location ~* ^/(plugins/|administrator/|components/) {
        return 444;
    }

    # IoT / network device CVE probes (Hikvision, D-Link, QNAP, etc.)
    location ~* ^/(SDK/|HNAP1/|cgi-bin/|ssi\.cgi|partymgr/) {
        return 444;
    }

    # Exposed admin / debug endpoints
    location ~* ^/(actuator/|telescope/|solr/|zabbix/|jasperserver|debug/|manager/html) {
        return 444;
    }

    # Skimmer / backdoor fingerprinting sweeps — willow ships no /js, /assets,
    # or /static directories, so any request under these paths is a scanner
    # checking whether this box is already compromised by a prior campaign.
    location ~* ^/(js/|assets/js/|static/) {
        return 444;
    }
    location ~* ^/(bot-connect|antibot-client)\.js$ {
        return 444;
    }

    # Non-dotfile secret/config fishing (dotfiles like .env are already
    # blocked globally in nginx.global.conf)
    location ~* ^/(secrets\.(json|yaml)|client_secret\.json|config\.(json|yaml|yml))$ {
        return 444;
    }
    # --- End bot / scanner mitigation ---

    # All traffic goes through Express — auth gate is enforced there
    location / {
        proxy_pass http://localhost:9090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FORGE SSL (DO NOT REMOVE!)
    ssl_certificate /etc/nginx/ssl/domains/1818825/3611246/server.crt;
    ssl_certificate_key /etc/nginx/ssl/domains/1818825/3611246/server.key;

    include forge-conf/3264110/site.conf;
}

# FORGE CONFIG (DO NOT REMOVE!)
include forge-conf/3264110/after/*;
include forge-conf/3264110/willow.jerome-arfouche.ca/after/*;

