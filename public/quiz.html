<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BDI-II Quiz</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="container">
    <header class="app-header">
      <h1><a href="/" style="color:inherit;text-decoration:none">BDI-II Inventory</a></h1>
      <a href="/results.html">Past results</a>
    </header>

    <div id="quiz-card" class="card">
      <div class="progress"><div id="progress-bar" style="width:0"></div></div>

      <div id="question-block">
        <div class="q-title" id="q-counter"></div>
        <h2 class="q-prompt" id="q-prompt"></h2>
        <ul class="answer-list" id="answer-list"></ul>
      </div>

      <div class="actions">
        <button class="secondary" id="back-btn" type="button">Back</button>
        <div class="spacer"></div>
        <button id="next-btn" type="button" disabled>Next</button>
      </div>
    </div>

    <div id="result-card" class="card" style="display:none">
      <h2>Your result</h2>
      <div class="summary-score">
        <span id="result-score">0</span>
        <span class="summary-max">/ 60</span>
      </div>
      <div>
        <span id="result-pill" class="severity-pill">&nbsp;</span>
      </div>
      <p class="muted" id="result-explainer" style="margin-top:14px"></p>
      <p class="muted" id="result-saved-as" style="font-size:12px"></p>
      <div class="actions">
        <a class="btn" href="/quiz.html">Take it again</a>
        <a class="btn secondary" href="/results.html">View past results</a>
      </div>
      <p class="muted" style="font-size:12px;margin-top:18px">
        This screening tool is informational, not a clinical diagnosis. If you
        are in distress or have thoughts of self-harm, please reach out to a
        qualified professional or local crisis service.
      </p>
    </div>
  </div>

  <script src="/questions.js"></script>
  <script>
    // Quiz state
    const answers = new Array(QUESTIONS.length).fill(null); // index per Q
    let current = 0;

    const counterEl = document.getElementById('q-counter');
    const promptEl  = document.getElementById('q-prompt');
    const listEl    = document.getElementById('answer-list');
    const backBtn   = document.getElementById('back-btn');
    const nextBtn   = document.getElementById('next-btn');
    const progBar   = document.getElementById('progress-bar');

    function render() {
      const q = QUESTIONS[current];
      counterEl.textContent = `Question ${current + 1} of ${QUESTIONS.length}`;
      promptEl.textContent = q.title;

      listEl.innerHTML = '';
      q.answers.forEach((a, i) => {
        const li = document.createElement('li');
        const id = `opt-${current}-${i}`;
        const label = document.createElement('label');
        label.htmlFor = id;
        const radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = `q-${current}`;
        radio.id = id;
        radio.value = String(i);
        if (answers[current] === i) {
          radio.checked = true;
          label.classList.add('selected');
        }
        radio.addEventListener('change', () => {
          answers[current] = i;
          // refresh selected styles
          [...listEl.querySelectorAll('label')].forEach((l) => l.classList.remove('selected'));
          label.classList.add('selected');
          nextBtn.disabled = false;
        });

        const text = document.createElement('span');
        text.textContent = a.text;

        label.appendChild(radio);
        label.appendChild(text);
        li.appendChild(label);
        listEl.appendChild(li);
      });

      backBtn.disabled = current === 0;
      nextBtn.disabled = answers[current] === null;
      nextBtn.textContent = current === QUESTIONS.length - 1 ? 'Submit' : 'Next';

      const pct = ((current) / QUESTIONS.length) * 100;
      progBar.style.width = pct + '%';
    }

    backBtn.addEventListener('click', () => {
      if (current > 0) { current -= 1; render(); }
    });

    nextBtn.addEventListener('click', async () => {
      if (answers[current] === null) return;
      if (current < QUESTIONS.length - 1) {
        current += 1;
        render();
      } else {
        await submit();
      }
    });

    async function submit() {
      nextBtn.disabled = true;
      progBar.style.width = '100%';

      const payload = {
        answers: QUESTIONS.map((q, i) => {
          const idx = answers[i];
          const a = q.answers[idx];
          return {
            questionIndex: i,
            questionTitle: q.title,
            answerIndex: idx,
            answerText: a.text,
            score: a.score
          };
        })
      };

      const totalScore = payload.answers.reduce((s, a) => s + a.score, 0);
      const band = severityFor(totalScore);
      payload.severity = band.name;

      let saveInfo = null;
      try {
        const resp = await fetch('/api/results', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (resp.ok) saveInfo = await resp.json();
      } catch (e) {
        console.error('save failed', e);
      }

      // Show result screen
      document.getElementById('quiz-card').style.display = 'none';
      const resCard = document.getElementById('result-card');
      resCard.style.display = '';
      document.getElementById('result-score').textContent = String(totalScore);
      const pill = document.getElementById('result-pill');
      pill.textContent = band.name;
      pill.style.background = band.color;
      const explainer = document.getElementById('result-explainer');
      explainer.textContent = `Score range ${band.min}–${band.max} corresponds to ${band.name.toLowerCase()} symptoms (scaled from the standard BDI-II to account for the omitted question 9).`;
      const savedAs = document.getElementById('result-saved-as');
      if (saveInfo && saveInfo.file) {
        savedAs.textContent = `Saved as results/${saveInfo.file}`;
      } else {
        savedAs.textContent = 'Could not save the result file. Check the server console.';
      }
    }

    render();
  </script>
</body>
</html>
